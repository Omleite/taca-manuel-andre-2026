  - { type: "mobile", prefix: "9xx", portability: "NOS", ims_status: "ABSENT", solution: "NOS Mobile CS", platform: "2G GSM / 4G CSFB" }
  - { type: "special", prefix: "800/808/707/760/761", solution: "NOS Special Service", platform: "IN Platform / IMS TAS" }
  - { type: "non_geographic_ip", prefix: "300–309", solution: "NOS Non-Geographic VoIP", platform: "IMS / SBC Empresarial" }
  - { portability: "PORTED_OUT", solution: "NOT_NOS", action: "FIM ABSOLUTO — NPREFIX + Operador Destino" }

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 6 — SUBSCRIBER IDENTITY & SERVICES
# ═══════════════════════════════════════════════════════════════════════════════

subscriber_identity:
  fields:
    MSISDN: "Mobile Subscriber ISDN Number"
    IMSI: "International Mobile Subscriber Identity — unique SIM identifier"
    AMSISDN:
      equal_to_msisdn: "voice blocked in favour of CSD/Fax"
      different_from_msisdn: "MSISDN handles voice/SMS; AMSISDN handles CSD/Fax"

  volte_ics_rules:
    ics1_rule: "ICS-1 in HLR = definitive indicator VoLTE or Mobile Centrex"
    hss_subscriber_profile_rule: "Unconditionally mandatory. Authoritative for VoLTE, Mobile Centrex, multi-device, Smart Number."
    volte_determination: "ICS-1 present + CSP 79 or 80"
    mobile_centrex_determination: "ICS-1 + CSP 73 + IMPI @ipcentrex.ims.nos.pt + Service Profile BW_MobileCentrex_Active"

hlr_services:
  teleservices:
    - { id: "TS11", name: "Telephony" }
    - { id: "TS12", name: "Emergency Calls" }
    - { id: "TS20", name: "SMS" }
    - { id: "TS21", name: "MO-SMS" }
    - { id: "TS22", name: "MT-SMS" }
    - { id: "TS61", name: "FAX G3" }
    - { id: "TS62", name: "FAX G3 Non-Transparent" }
  bearer_services:
    - { id: "BS20", name: "PAD Access" }
    - { id: "BS21", name: "ASDI" }
    - { id: "BS22", name: "ASDI 2400bps" }
    - { id: "BS30", name: "GPRS" }
    - { id: "BS50", name: "Data Circuit Duplex Async" }
  supplementary_services:
    call_forwarding: ["CFU", "CFB", "CFNRY (default 20s)", "CFNRC"]
    voicemail_pattern: "9Y66XXXXXXX — '66' after first two digits"
    call_barring: ["BAOC", "BOIC", "BOIC-exHC", "BAIC", "BICROAM", "OCB1"]
    other: ["CW", "HOLD", "MPTY", "ECT", "CLIP/CLIR", "COLP/COLR", "USSD", "UUS", "AoC"]
  odb:
    OBR2:
      detection: "ODB flags in HGSDP_Perfil — NOT from LOCATION DATA"
      effect: "HLR rejects any Location Update from foreign VLR/SGSN"
      hplmn_behaviour: "LOCATION DATA shows normal NOS addresses — CORRECT and EXPECTED"
      barred_state: "Consequence of foreign network attempting registration — expected with OBR-2"
      distinction: "BICROAM bars incoming calls when roaming; OBR-2 prevents registration in foreign networks"
      conclusion_note: "OBR-2 provisioned — subscriber not enabled for roaming."
      output_rule: "ONLY include OBR-2 in output when PROVISIONED. When NOT provisioned: do NOT write ANY line about OBR-2 — no 'Não presente', no 'ausente', no 'omitir', no placeholder, NOTHING. Skip the OBR-2 line entirely as if it does not exist in the template."
  camel_csi: ["O-CSI", "T-CSI", "MO-SMS CSI", "MT-SMS CSI", "D-CSI", "GPRS-CSI", "SS-CSI"]

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 7 — ROAMING & AUTHENTICATION
# ═══════════════════════════════════════════════════════════════════════════════

roaming:
  multi_layer_table:
    - { mechanism: "OBR-2", layer: "HLR ODB flags", effect: "Prevents registration in foreign VPLMN" }
    - { mechanism: "BICROAM", layer: "HLR SS", effect: "Bars incoming calls when roaming" }
    - { mechanism: "roamingRestriction: true", layer: "EPS/HSS", effect: "Restriction profile applied — NOT definitive alone. Requires epsTenantId + epsRoamingAllowed" }
    - { mechanism: "epsTenantId present", layer: "EPS/HSS", effect: "Tenant-specific restrictions — analyse tenant profile" }
    - { mechanism: "epsTenantId absent", layer: "EPS/HSS", effect: "Standard HSS operator restrictions" }
    - { mechanism: "epsRoamingAllowed: true", layer: "EPS/HSS", effect: "Roaming permitted at EPS level" }
    - { mechanism: "epsRoamingAllowed: false", layer: "EPS/HSS", effect: "Roaming totally blocked at EPS level" }
    - { mechanism: "roamingAllowed: false", layer: "IMS/HSS", effect: "Blocks IMS/VoLTE roaming" }
    - { mechanism: "Regional Subscription (LSA)", layer: "HLR", effect: "Geographic area restrictions" }
  definitive_eps_parameter: "epsRoamingAllowed"

authentication:
  algorithms: ["COMP128", "Milenage", "TUAK"]
  notes: "Ki presence (status only). SQN for Milenage/TUAK."

location_data:
  interpretation:
    - { state: "VLR ADDRESS = 4-<NOS address>", meaning: "Registered CS in HPLMN — resolve to node name" }
    - { state: "VLR ADDRESS = 4-<foreign address>", meaning: "Registered CS in foreign VPLMN (roaming)" }
    - { state: "VLR ADDRESS = BARRED", meaning: "Foreign VLR rejected — expected with OBR-2" }
    - { state: "SGSN NUMBER = <NOS address>", meaning: "Registered PS in HPLMN" }
    - { state: "SGSN NUMBER = BARRED", meaning: "Foreign SGSN rejected — expected with OBR-2" }
    - { state: "No VLR/SGSN", meaning: "Not registered (detached or purged)" }
  note: "OBR-2 detected from ODB flags — NOT from LOCATION DATA state"

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 8 — CSP / OICK REFERENCE
# ═══════════════════════════════════════════════════════════════════════════════

csp_oick_reference:
  csp_entries:
    - csp: "73"
      description: "Mobile Centrex — ICS-1 + Centrex em IMS/BroadSoft. Confirmar STEP 4 via IMPI/Service Profile."
    - csp: "79"
      description: "VoLTE — Roaming apenas com acordos CAMEL"
    - csp: "80"
      description: "VoLTE — Roaming mesmo sem acordo CAMEL"
  home_msisdns:
    oicks: ["20", "21", "22", "23", "25", "26"]
    note: "HOME MSISDNs 2G — não flaggear como erro"

# ═══════════════════════════════════════════════════════════════════════════════
