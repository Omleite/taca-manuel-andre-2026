# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 10 — FIXED VS MOBILE RULES
# ═══════════════════════════════════════════════════════════════════════════════

fixed_vs_mobile_rules:
  default_rule:
    starts_with: "3512"
    classification: "fixed"
    expected_mobile_profile_in_HLR: false
  implications:
    - "getAuthSubscription e GetEpcUdmSubscription NÃO aplicáveis a fixos"
    - "Centrex puro: HGSDP ausente = ESPERADO"
  home_service_exception:
    oicks: ["20", "21", "22", "23", "25", "26"]
    rule: "HOME 2G mobile — não flaggear"
  centrex_distinction:
    fixed_ACTIVE_CENTREX_with_HGSDP: "NOS Home Centrex"
    fixed_ACTIVE_CENTREX_without_HGSDP: "NOS Centrex (puro)"
  mobile_centrex_rule: >
    Mobile Centrex: número móvel (9xx) com IMS_STATUS=ACTIVE.
    Reclassificação APENAS no STEP 4 via IMPI @ipcentrex OU Service Profile BW_MobileCentrex_Active.

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 11 — MOBILE CENTREX
# ═══════════════════════════════════════════════════════════════════════════════

mobile_centrex:
  definition: "Centrex-like voice experience over standard mobile number (9xx) using IMS + BroadSoft"
  differentiators:
    - { attribute: "CSP", volte: "79 or 80", centrex: "73 (typical)" }
    - { attribute: "ICS-1", volte: "Present", centrex: "Present" }
    - { attribute: "eNUM", volte: "ACTIVE (A or E)", centrex: "ACTIVE (A or E)" }
    - { attribute: "IMPI", volte: "Standard", centrex: "MSISDN@ipcentrex.ims.nos.pt" }
    - { attribute: "Service Profile", volte: "Standard VoLTE", centrex: "BW_MobileCentrex_Active" }
    - { attribute: "BroadSoft", volte: "Optional", centrex: "PadraoMovel active" }
    - { attribute: "Final classification", volte: "NOS Mobile VoLTE", centrex: "NOS Mobile Centrex (at STEP 4)" }
  detection: "Reclassification at STEP 4 when IMPI @ipcentrex OR Service Profile = BW_MobileCentrex_Active. Either sufficient."
  notes:
    - "eNUM PATTERN_A/E → both ACTIVE. Distinction NOT at eNUM."
    - "MTAS: limited data for Mobile Centrex — may be expected."
    - "BroadSoft (STEP 6): always execute. Expect PadraoMovel active."
    - "CSP=73 + ICS-1 = strong indicator. Always verify STEP 4."

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 12 — IOT / M2M
# ═══════════════════════════════════════════════════════════════════════════════

iot_m2m:
  range: "35149x"
  characteristics: "Data Only — no voice, no IMS, no MTAS"
  expected: ["BS30 present", "TS11 absent", "ICS-1 absent", "HssSubscriberProfile absent"]
  ims_status: "NOT_APPLICABLE — EXPECTED"
  not_applicable: ["MTAS", "getAuthSubscription", "GetEpcUdmSubscription", "SubsInfoByIMPU", "BwGetUserInfo"]
  smart_number: "Not applicable"

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 13 — MISCONFIGURATION PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

misconfiguration_patterns:
  - { symptom: "Análise técnica sem FGNTP", severity: "CRÍTICA", consequence: "Diagnóstico inválido" }
  - { symptom: "Cannot receive calls", causes: ["CFU/CFNRC active", "BAIC provisioned", "wrong MSC registration"] }
  - { symptom: "Cannot make calls", causes: ["BAOC/ODB barring", "TS11 missing", "CAMEL SCP unreachable"] }
  - { symptom: "SMS not working", causes: ["TS20/TS21/TS22 missing", "SMS barring", "CAMEL MO-SMS failure"] }
  - { symptom: "VoLTE not working", causes: ["ICS-1 absent", "CSP not 79/80", "MTAS misconfiguration", "HssSubscriberProfile absent", "eNUM ACTIVE but ICS-1 absent"] }
  - { symptom: "5G SA not working", causes: ["5G_AKA present but nb:udm absent in GetEpcUdmSubscription", "extendedAccessRestriction non-zero", "slice/DNN/QoS incorrect", "unknown AMF/SMF UUID"] }
  - symptom: "Smart Number not detected"
    note: "Only when secondary MSISDN exists but agent missed it"
    causes:
      - "publicIdValue not analysed in STEP 4"
      - "aliasGroupId not correlated"
      - "serviceProfileId not verified"
      - "privateUserId not checked"
      - "maxNumberOfContacts=1 erroneously used as exclusion"
  - symptom: "Secondary MSISDN omitted"
    note: "Only when secondary MSISDN exists but was omitted"
    causes: ["Analysis limited to primary", "publicIdValue ignored", "aliasGroupId not correlated"]
  - { symptom: "Multi-device/Smart Number not working", causes: ["HssSubscriberProfile absent/incomplete", "iFC missing", "IMPU/IMPI wrong"] }
  - { symptom: "Mobile Centrex not working", causes: ["ICS-1 absent", "IMPI wrong domain", "Service Profile not BW_MobileCentrex_Active", "BwGetUserInfo PadraoMovel not active/Suspended", "IMS Unregistered"] }
  - { symptom: "Mobile Centrex misidentified as VoLTE", causes: ["Preliminary PRE-4=VoLTE — reclassification only at STEP 4"] }
  - { symptom: "Subscriber unreachable abroad", causes: ["OBR-2 in ODB flags"], conclusion: "OBR-2 provisioned — not enabled for roaming", not_misconfiguration: true }
  - { symptom: "Incoming calls blocked when roaming", causes: ["BICROAM active"] }
  - symptom: "Roaming blocked at 4G/EPS"
    causes:
      - "epsRoamingAllowed: false — definitive parameter"
      - "roamingRestriction: true + epsRoamingAllowed: false — total block confirmed"
    note: "roamingRestriction: true alone NOT definitive. Always check epsTenantId + epsRoamingAllowed."
  - symptom: "Roaming EPS partial restrictions (tenant)"
    causes:
      - "roamingRestriction: true + epsTenantId present → tenant restrictions"
      - "Check tenant profile in HSS"
  - { symptom: "Roaming blocked at IMS", causes: ["roamingAllowed: false in IMS/HSS"] }
  - { symptom: "Data not working", causes: ["BS30 absent", "APN not provisioned", "QoS misconfigured", "ODB PS barring"] }
  - { symptom: "Unexpected call forwarding", causes: ["CFU/CFB/CFNRY/CFNRC with wrong destination"] }
  - { symptom: "International calls blocked", causes: ["BOIC/BOIC-exHC", "ODB international barring"] }
  - { symptom: "AMSISDN conflict", causes: ["AMSISDN = MSISDN"] }
  - { symptom: "eNUM out of sync", causes: ["eNUM ACTIVE but HssSubscriberProfile absent", "eNUM ABSENT but HssSubscriberProfile present"] }
  - { symptom: "Fixed Centrex without voice", causes: ["HssSubscriberProfile absent", "IMPU wrong domain", "iFC missing", "IMS Unregistered", "BwGetUserInfo Suspended"] }
  - { symptom: "Centrex IMPU wrong", causes: ["Wrong domain (ims.nos.pt vs ipcentrex.ims.nos.pt)", "IMPU ≠ MSISDN"] }
  - { symptom: "IoT/M2M no PS data", causes: ["BS30 absent", "APN M2M wrong", "ODB PS barring", "QoS inadequate", "EPS incomplete"] }
  - { symptom: "IoT/M2M unexpected voice", causes: ["TS11 present", "ICS-1 present", "HssSubscriberProfile found"] }
  - { symptom: "IoT/M2M not registered", causes: ["IMSI not provisioned", "SIM inactive", "APN missing", "NB-IoT/LTE-M not in area", "Low duty cycle (may be normal)"] }

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 14 — EXPECTED BEHAVIOURS (NOT ERRORS)
# ═══════════════════════════════════════════════════════════════════════════════

expected_behaviours:
  - "IoT/M2M + eNUM = SUBSCRIPTION NOT DEFINED → normal"
  - "IoT/M2M + HssSubscriberProfile absent → normal"
  - "Pure Centrex (fixed) + HGSDP absent → normal and expected"
  - "Home Centrex + ICS-1 absent in HGSDP → normal"
  - "Prefix 2xx with OICKs 20/21/22/23/25/26 → HOME MSISDN 2G → normal"
  - "getAuthSubscription without 5G_AKA → not 5G SA → normal"
  - "OBR-2 + LOCATION DATA with NOS addresses → subscriber in HPLMN → CORRECT"
  - "Mobile Centrex preliminary = NOS Mobile VoLTE → EXPECTED (reclassification at STEP 4)"
  - "MTAS limited data for Mobile Centrex → may be expected"
  - "VLR/MSC not in inventory → report raw, flag UNKNOWN NODE"
  - "Smart Number / Multi-device absent → normal → inline note only"
  - "Smart Number not analysed (IMS/HSS error) → inline note only"
  - "maxNumberOfContacts=1 with no secondary MSISDN → normal"
  - "maxNumberOfContacts=1 with secondary MSISDN → Smart Number confirmed, Multi-device line OMITTED"
  - "roamingRestriction: true alone → NOT definitive — apply EPS Roaming Interpretation Chain"

# ═══════════════════════════════════════════════════════════════════════════════
# SECÇÃO 15 — FINAL CONCLUSION RULE
# ═══════════════════════════════════════════════════════════════════════════════

final_conclusion:
  output_template: "skill NumeracaoNOS — OUTPUT TEMPLATE — Standard Response Format (Sections 0–15)"
  must_include:
    - "Confirmed NOS Solution (Mobile Centrex if reclassified at STEP 4)"
    - "OBR-2 conclusion note if provisioned"
    - "HGSDP profile with resolved VLR/MSC node name (STEP 1)"
    - "MTAS profile (STEP 2)"
    - "getAuthSubscription IS_5G_SA result (STEP 2B)"
    - "GetEpcUdmSubscription profile if 5G SA (STEP 2C)"
    - "HSS profile with EPS roaming chain: roamingRestriction → epsTenantId → epsRoamingAllowed (STEP 3)"
    - "HssSubscriberProfile: IMPI, Service Profile, roamingAllowed (STEP 4)"
    - "Smart Number/Multi-device: full section if detected (Multi-device ONLY if maxNumberOfContacts>1); inline note if not detected or unavailable"
    - "BwGetUserInfo with PadraoMovel for Mobile Centrex (STEP 6)"
    - "All anomalies and misconfigurations"
  close_with: "Most likely root cause(s) + checks done + what to change"

