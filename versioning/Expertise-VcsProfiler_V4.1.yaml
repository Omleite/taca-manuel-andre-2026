  - { type: "fixed_geographic", prefix: "2xx", portability: "NOS", ims_status: "ACTIVE_CENTREX", hgsdp: "absent", solution: "NOS Centrex (puro)", platform: "IMS IP Centrex", note: "HGSDP ausente = ESPERADO" }
  - { type: "fixed_geographic", prefix: "2xx", portability: "NOS", ims_status: "ACTIVE", solution: "NOS Fixed IMS", platform: "FTTH / HFC / Ericsson IMS" }
  - { type: "fixed_geographic", prefix: "2xx", portability: "NOS", ims_status: "ABSENT", solution: "NOS Fixed Legacy / BroadSoft", platform: "PSTN / DSL / BroadSoft XSP" }
