# ═══════════════════════════════════════════════════════════════════════════════
# ServicosIN v1.1 — NOS IN Services & Customer Segment Reference
# Reference knowledge base for subscriber profile configurations on Ericsson AXE/HLR.
# Referenced by: Expertise-VcsProfiler V4.2
# ═══════════════════════════════════════════════════════════════════════════════

meta:
  version: "1.1"
  date: "2026-06-29"
  based_on: "ServicosIN (26/04/2026)"
  format: "Pure YAML"
  developed_by: "NOS Tech - Operations - Services - VCS"

# ═══════════════════════════════════════════════════════════════════════════════
# PURPOSE & USAGE
# ═══════════════════════════════════════════════════════════════════════════════

purpose:
  description: >
    Reference knowledge base for NOS MSISDN subscriber profile configurations
    on Ericsson AXE/HLR nodes. Maps customer segments (CSP, OICK, TICK) to
    IN service triggers and associated Service Keys.
  role: "LOOKUP REFERENCE — not an execution trigger"
  when_to_consult:
    - "When HGSDP_Perfil returns CSP/OICK/TICK values and agent needs to identify customer type"
    - "When agent needs to determine expected IN service nodes for a given profile"
    - "When agent needs to validate Service Key assignments (MO/MT voice and SMS)"
    - "When troubleshooting CAMEL/IN related issues (missing triggers, wrong SK)"
    - "When identifying customer segment from provisioning data"
  not_for:
    - "This skill does NOT trigger tool calls"
    - "This skill does NOT define execution sequence (that is NumeracaoNOS)"

# ═══════════════════════════════════════════════════════════════════════════════
# COLUMN GLOSSARY
# ═══════════════════════════════════════════════════════════════════════════════

glossary:
  tipos_cliente: "Customer type / commercial segment name"
  ambiente: "Environment — Producao (production) or test/reserved"
  csp: "Customer Service Profile — HLR parameter identifying service bundle. Key lookup field from HGSDP_Perfil."
  oick: "O-CSI Identification Key — identifies originating CAMEL trigger profile"
  tick: "T-CSI Identification Key — identifies terminating CAMEL trigger profile"
  servicos_in_node: >
    IN platform node(s) handling the call. Values:
    LOSDP = Local Online SDP (prepaid charging),
    POSDP = Proxy Online SDP,
    xSDP = External SDP,
    MxIN = Mixed IN (multiplex),
    NGIN1 = Next Gen IN platform 1 (VPN Alcatel/Corporate),
    NGIN2 = Next Gen IN platform 2 (FM Pessoal),
    SCP1–SCP7 = Service Control Point nodes,
    IMS = IP Multimedia Subsystem trigger,
    RBT = Ring Back Tones,
    VPN2.4 = VPN migration platform,
    SCF Broadsoft = Service Creation Framework via BroadSoft
  sk_mo: "Service Key for Mobile Originated voice calls. Multiple keys separated by '+' = chained triggers."
  sk_mt: "Service Key for Mobile Terminated voice calls. Multiple keys separated by '+' = chained triggers."
  sk_sms_mo: "Service Key for MO-SMS"
  sk_sms_mt: "Service Key for MT-SMS"

# ═══════════════════════════════════════════════════════════════════════════════
# LOOKUP INSTRUCTIONS
# ═══════════════════════════════════════════════════════════════════════════════

lookup_instructions:
  primary_key: "CSP (from HGSDP_Perfil)"
  secondary_keys: ["OICK", "TICK"]
  matching_rules:
    - "CSP is the primary lookup. Multiple rows may share the same CSP but differ in OICK/TICK."
    - "Some entries have CSP='na' or CSP='x' — these are identified by OICK/TICK only."
    - "When CSP matches multiple rows, use OICK to disambiguate."
    - "TICK differentiates terminating service variants (RBT, VoLTE, Kids, etc.)"
    - "Values 'na' or null mean not applicable / not provisioned."
    - "Values '-' mean explicitly excluded / blocked."
  output_use:
    - "Use tipos_cliente to report customer segment in analysis"
    - "Use servicos_in_node to validate CAMEL triggers match expected platform"
    - "Use SK values to validate Service Key assignments in O-CSI/T-CSI"
    - "Flag mismatch between HGSDP provisioning and expected IN profile as MISCONFIGURATION"

# ═══════════════════════════════════════════════════════════════════════════════
# SPECIAL CSP VALUES (cross-reference with Expertise)
# ═══════════════════════════════════════════════════════════════════════════════

special_csp_notes:
  - { csp: "73", note: "VPN Broadsoft / Mobile Centrex — SCF Broadsoft. Cross-ref with Expertise mobile_centrex rules." }
  - { csp: "79", note: "VoLTE with CAMEL roaming — defined in Expertise, NOT in this table (IMS-only, no IN trigger)." }
  - { csp: "80", note: "VoLTE without CAMEL roaming — defined in Expertise, NOT in this table (IMS-only, no IN trigger)." }
  - { csp: "0", note: "Dunning state — services suspended, no IN triggers active." }

